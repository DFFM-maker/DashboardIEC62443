server {
    listen 80;
    server_name __SERVER_HOST__;

    # Frontend (file statici buildati)
    root __APP_DIR__/frontend/dist;
    index index.html;

    # SPA routing: tutte le route sconosciute → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # WebSocket Socket.io (real-time scan logs)
    location /socket.io/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
    }

    # Assets statici (loghi SVG serviti dal backend)
    location /assets/ {
        proxy_pass http://127.0.0.1:3001;
    }

    # Aumenta dimensione upload per import .otsa
    client_max_body_size 50m;
}
